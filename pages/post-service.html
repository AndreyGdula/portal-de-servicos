<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Serviços</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="shortcut icon" href="../img/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="../style/post-service.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
</head>
<body>
    <header>
        <div class="title-wrapper">
            <span class="material-symbols-outlined" id="logo-icon">next_week</span>
            <h1 id="title-h1">PORTAL DE SERVIÇOS</h1>
        </div>
        <div class="btn-container">
            <button onclick="window.location.href='../index.html'" id="btn-home">
                <span class="material-symbols-outlined">home</span>
                INÍCIO
            </button>
        </div>
    </header>
    <main>
        <h2>CRIAR POSTAGEM</h2>
        <hr>
        <div class="post-container">
            <div class="infos-post-container">
                <input type="text" name="name" id="name" placeholder="Nome do serviço">
                <div id="select-price-wrapper">
                    <div class="select-wrapper">
                        <select name="category" id="category">
                            <option value="" selected disabled hidden>Categoria</option>
                            <option value="recreacao">Recreação</option>
                            <option value="design">Design</option>
                            <option value="servicos-gerais">Serviços Gerais</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <input type="text" name="price" id="price" placeholder="Preço" inputmode="decimal">
                </div>
                <input type="text" name="description" id="description" placeholder="Descrição do serviço (200 caracteres)" maxlength="200">
            </div>
            <div class="attachments-container">
                <input type="file" name="image-file" id="image-file" accept="image/*">
                <div class="card-img-container">
                    <img src="../img/img-preview.svg" alt="Imagem do serviço" id="preview-image">
                </div>
            </div>
        </div>
        <div class="btn-container">
            <button id="cancel-post-btn">CANCELAR</button>
            <button id="publish-btn">PUBLICAR</button>
        </div>
    </main>
</body>
</html>
