<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Serviços</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/login.css">
    <link rel="shortcut icon" href="../img/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
</head>
<body>
    <header>
        <div class="title-wrapper">
            <span class="material-symbols-outlined" id="logo-icon">next_week</span>
            <h1 id="title-h1">PORTAL DE SERVIÇOS</h1>
        </div>
        <div class="btn-container">
            <button id="btn-home">
                <span class="material-symbols-outlined">Home</span>
                INÍCIO
            </button>
        </div>
    </header>
    <main>
        <div class="login-card">
            <h2>Insira seu e-mail:</h2>
            <input type="email" name="email" id="email">
            <h2>Insira sua senha:</h2>
            <input type="password" name="password" id="password">
            <button id="login-btn">ENTRAR</button>
            <p class="register-link">Não tem uma conta? <a href="register.html" class="register-link">Cadastre-se</a></p>
        </div>
    </main>
    <script src="../scripts/script.js"></script>
</body>
</html>
