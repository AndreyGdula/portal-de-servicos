<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Serviços</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="shortcut icon" href="/img/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
</head>
<body>
    <header>
        <div class="title-wrapper">
            <span class="material-symbols-outlined" id="logo-icon">next_week</span>
            <h1 id="title-h1">PORTAL DE SERVIÇOS</h1>
        </div>
        <div class="btn-container">
            <button id="btn-enter">
                <span class="material-symbols-outlined">person</span>
                ENTRAR
            </button>
        </div>
    </header>
    <main>
        <nav>
            <div class="search-wrapper">
                <span class="material-symbols-outlined">search</span>
                <input class="search-input" id="search-input" type="text" placeholder="Pesquisar serviço...">
            </div>

            <div class="filter-container">
                <div class="select-wrapper">
                    <select name="categoria" id="categoria">
                        <option value="" selected>Categorias</option>
                        <option value="Design">Design</option>
                        <option value="Serviços Gerais">Serviços Gerais</option>
                        <option value="Fotografia">Fotografia</option>
                    </select>
                </div>

                <div class="select-wrapper">
                    <select name="estrelas" id="estrelas">
                        <option value="" selected>Avaliação</option>
                        <option value="1">★</option>
                        <option value="2">★★</option>
                        <option value="3">★★★</option>
                        <option value="4">★★★★</option>
                        <option value="5">★★★★★</option>
                    </select>
                </div>

                <button id="btn-add" style="display: none;">
                    <span class="material-symbols-outlined" onclick="window.location.href='pages/post-service.html'">Add_2</span>
                </button>
            </div>
        </nav>

        <div class="service-container">
            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/desenho.jpeg" alt="Desenho anime">
                </div>
                <h2 class="titulo">Arte Digital</h2>
                <h3 class="categoria">Categoria: Design</h3>
                <h4 class="nome">Eduardo Henrique</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/trabalhador.jpeg" alt="Trabalhador">
                </div>
                <h2 class="titulo">Ajudo em obra</h2>
                <h3 class="categoria">Categoria: Serviços Gerais</h3>
                <h4 class="nome">Natan</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/foto-casamento.jpeg" alt="Emerson Moura">
                </div>
                <h2 class="titulo">Fotógrafo</h2>
                <h3 class="categoria">Categoria: Fotografia</h3>
                <h4 class="nome">Emerson Moura</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
</body>
</html>
