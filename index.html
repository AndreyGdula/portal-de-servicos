<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Serviços</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
</head>
<body>
    <header>
        <div class="title-wrapper">
            <span class="material-symbols-outlined" id="logo-icon">next_week</span>
            <h1 id="title-h1">PORTAL DE SERVIÇOS</h1>
        </div>
        <div class="btn-container">
            <button onclick="window.location.href='pages/login.html'">
                <span class="material-symbols-outlined">person</span>
                ENTRAR
            </button>
        </div>
    </header>
    <main>
        <nav>
            <div class="search-wrapper">
                <span class="material-symbols-outlined">search</span>
                <input class="search-input" type="text" placeholder="Pesquisar serviço...">
            </div>
            <div class="filter-container">
                <div class="select-wrapper">
                    <select name="category" id="category">
                        <option value=""disabled selected hidden>Categorias</option>
                        <option value="1">Categoria 1</option>
                        <option value="2">Categoria 2</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select name="stars" id="stars">
                        <option value="1" selected>★</option>
                        <option value="2">★★</option>
                        <option value="3">★★★</option>
                        <option value="4">★★★★</option>
                        <option value="5">★★★★★</option>
                    </select>
                </div>
                <button id="btn-add" style="display: none;"><span class="material-symbols-outlined">Add_2</span></button>
            </div>
        </nav>
        <div class="service-container">
            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/desenho.webp" alt="Desenho anime">
                </div>
                <h2>Arte Digital</h2>
                <h3>Categoria: Design</h3>
                <h4>Eduardo Henrique</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/vegeta.webp" alt="Trabalhador">
                </div>
                <h2>Ajudo em obra</h2>
                <h3>Categoria: Serviços Gerais</h3>
                <h4>Natan</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img class="card-img" src="img/emerson.jpg" alt="Emerson Royal">
                </div>
                <h2>Finjo que sou jogador</h2>
                <h3>Categoria: Recreação</h3>
                <h4>Emerson Royal</h4>
                <div class="info-card-container">
                    <div class="stars-box">
                        <span class="material-symbols-outlined">star</span>
                        <span class="material-symbols-outlined">star</span>
                    </div>
                    <button class="ver-mais">+ VER MAIS</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
